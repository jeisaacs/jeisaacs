# Managed by Terraform (github-tf). Do not edit directly — change
# files/reusable-security.yml and let CI sync it to the host repos.
#
# Reusable security-scanning workflow. Callers invoke it with `uses:` and an
# optional `python: true` input to enable the Python-specific scans.
name: Reusable Security Scanning

on:
  workflow_call:
    inputs:
      python:
        description: "Run Python dependency (pip-audit) + SAST (Bandit) scans"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  gitleaks:
    name: "Gitleaks Secret Scan"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz | tar xz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --no-banner --redact --verbose

  trivy:
    name: "Trivy Vulnerability Scan"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: "1"

  pip-audit:
    name: "pip-audit Dependency Scan"
    if: ${{ inputs.python }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run pip-audit
        run: |
          python -m pip install --upgrade pip pip-audit
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt --desc on
          elif [ -f pyproject.toml ]; then
            pip install -e . >/dev/null 2>&1 || true
            pip-audit --skip-editable --desc on
          else
            echo "No Python dependency manifest found; skipping pip-audit."
          fi

  bandit:
    name: "Bandit SAST Scan"
    if: ${{ inputs.python }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run Bandit
        run: |
          python -m pip install --upgrade pip bandit
          bandit -r . -x './tests,./test,./.venv,./venv,./.git,./__pycache__' \
            --severity-level high \
            --confidence-level high
